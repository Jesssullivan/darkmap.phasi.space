# =============================================================================
# GitHub Actions: tofu apply on push to main when infra/tofu/** changed.
#
# Gated on the `production` GitHub Environment, which requires manual approval
# (configure required reviewers in repo Settings → Environments → production).
# Workflow_dispatch supported for ad-hoc applies after a state import.
# =============================================================================

name: Tofu apply

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/tofu-apply.yml'
      - 'infra/tofu/**'
  workflow_dispatch:
    inputs:
      auto_approve:
        description: 'Skip the apply preview step (apply directly to a fresh plan)'
        type: boolean
        default: false

concurrency:
  group: tofu-apply
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  route-preflight:
    name: tofu route preflight
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    outputs:
      ready: ${{ steps.preflight.outputs.ready }}
      labels_json: ${{ steps.preflight.outputs.labels_json }}
      label_list: ${{ steps.preflight.outputs.label_list }}
      reason: ${{ steps.preflight.outputs.reason }}
    steps:
      - uses: actions/checkout@v6

      - id: preflight
        name: Check RustFS/backend runner route
        env:
          RUNNER_ROUTE_PREFLIGHT_TOKEN: ${{ secrets.RUNNER_ROUTE_PREFLIGHT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ALLOW_UNVERIFIED_SELF_HOSTED_ROUTE: 'true'
          TOFU_LINUX_RUNNER_LABELS_JSON: ${{ vars.TOFU_LINUX_RUNNER_LABELS_JSON || '' }}
          PRIMARY_LINUX_RUNNER_LABELS_JSON: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]' }}
        run: node scripts/ci-tofu-route-preflight.mjs

  route-blocked:
    name: tofu apply route blocked
    needs: route-preflight
    if: needs.route-preflight.outputs.ready != 'true'
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    steps:
      - name: Summarize blocked apply route
        env:
          LABELS: ${{ needs.route-preflight.outputs.label_list }}
          REASON: ${{ needs.route-preflight.outputs.reason }}
        run: |
          {
            echo "### tofu apply blocked before production environment"
            echo
            echo "The workflow did not request the \`production\` environment"
            echo "because no repository-visible, cluster-capable runner matched"
            echo "the selected Tofu labels."
            echo
            echo "- Selected labels: \`${LABELS}\`"
            echo "- Reason: ${REASON}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::tofu apply route blocked: ${REASON}"

  apply:
    name: tofu apply (production)
    needs: route-preflight
    if: needs.route-preflight.outputs.ready == 'true'
    runs-on: ${{ fromJSON(needs.route-preflight.outputs.labels_json) }}
    environment: production
    env:
      CHECKOUT_PATH: repo-${{ github.job }}
      TF_DATA_DIR: /tmp/darkmap-tofu-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Reclaim stale runner workspace
        run: find "$GITHUB_WORKSPACE" -maxdepth 1 -mindepth 1 -type d -name 'repo-*' ! -name "$CHECKOUT_PATH" -exec rm -rf {} +

      - uses: actions/checkout@v6
        with:
          path: ${{ env.CHECKOUT_PATH }}

      - name: Configure GloriousFlywheel cache hints
        env:
          GF_ACTION_RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: bash "$CHECKOUT_PATH/scripts/setup-flywheel.sh"

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.11.6'
          tofu_wrapper: false

      - name: Install kubectl
        uses: yokawasa/action-setup-kube-tools@v0.13.5
        with:
          kubectl: '1.31.0'

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::error::KUBE_CONFIG_HONEY secret is required for tofu apply"
            exit 1
          fi

          kube_dir="$RUNNER_TEMP/darkmap-kube"
          kubeconfig="$kube_dir/config"
          mkdir -p "$kube_dir"
          echo "$KUBE_CONFIG_HONEY" | base64 -d > "$kubeconfig"
          chmod 600 "$kubeconfig"
          "$CHECKOUT_PATH/scripts/ci-normalize-kubeconfig.sh" "$kubeconfig" honey
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"
          echo "TF_VAR_kubeconfig=$kubeconfig" >> "$GITHUB_ENV"

      - name: tofu init (rustfs backend)
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
        run: ../../scripts/ci-tofu-init-retry.sh -backend-config=backend.hcl

      - name: tofu state backend check
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
        run: ../../scripts/ci-tofu-state-check.sh

      - name: tofu plan
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: tofu plan -out=darkmap.tfplan

      - name: tofu apply
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: ../../scripts/ci-tofu-apply-retry.sh darkmap.tfplan

      - name: Upload applied plan + state-version reference
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tofu-apply-${{ github.run_id }}
          path: |
            ${{ env.CHECKOUT_PATH }}/infra/tofu/darkmap.tfplan
            ${{ env.CHECKOUT_PATH }}/infra/tofu/.terraform.lock.hcl
            ${{ env.CHECKOUT_PATH }}/infra/tofu/tofu-init.log
            ${{ env.CHECKOUT_PATH }}/infra/tofu/tofu-apply.log
            ${{ env.CHECKOUT_PATH }}/infra/tofu/tofu-apply-reinit.log
            ${{ env.CHECKOUT_PATH }}/infra/tofu/tofu-state-list.log
          retention-days: 90
