# =============================================================================
# GitHub Actions: tofu plan on PRs touching infra/tofu/**.
#
# Pattern mirrored from elders.tinyland.dev/.github/workflows/validate-tofu.yml
# with two additions: (1) backend-init against rustfs via GH secrets, and
# (2) sticky PR comment with the plan diff.
#
# Runner: GloriousFlywheel self-hosted (tailnet-joined) by default; the
# `TOFU_LINUX_RUNNER_LABELS_JSON` repo var lets the SRE swap the backend-
# reachable pool without touching this file.
# =============================================================================

name: Tofu plan

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tofu-plan.yml'
      - 'infra/tofu/**'
      - 'Justfile'
      - 'flake.nix'
      - '.envrc'
  workflow_dispatch:

concurrency:
  group: tofu-plan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  route-preflight:
    name: tofu route preflight
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    outputs:
      ready: ${{ steps.preflight.outputs.ready }}
      labels_json: ${{ steps.preflight.outputs.labels_json }}
      label_list: ${{ steps.preflight.outputs.label_list }}
      reason: ${{ steps.preflight.outputs.reason }}
    steps:
      - uses: actions/checkout@v6

      - id: preflight
        name: Check RustFS/backend runner route
        env:
          RUNNER_ROUTE_PREFLIGHT_TOKEN: ${{ secrets.RUNNER_ROUTE_PREFLIGHT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          TOFU_LINUX_RUNNER_LABELS_JSON: ${{ vars.TOFU_LINUX_RUNNER_LABELS_JSON || '' }}
          PRIMARY_LINUX_RUNNER_LABELS_JSON: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]' }}
        run: node scripts/ci-tofu-route-preflight.mjs

  route-blocked:
    name: tofu plan route blocked
    needs: route-preflight
    if: needs.route-preflight.outputs.ready != 'true'
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    steps:
      - name: Summarize blocked plan route
        env:
          LABELS: ${{ needs.route-preflight.outputs.label_list }}
          REASON: ${{ needs.route-preflight.outputs.reason }}
        run: |
          cat > /tmp/tofu-plan-blocked.md <<COMMENT
          ### tofu plan blocked before RustFS init

          The PR did not run \`tofu plan\` because no repository-visible,
          cluster-capable runner matched the selected Tofu labels.

          - Selected labels: \`${LABELS}\`
          - Reason: ${REASON}

          This is a routing/configuration blocker, not a Terraform/OpenTofu
          diff result. Bind the repo to the selected runner class or update
          \`TOFU_LINUX_RUNNER_LABELS_JSON\` to a RustFS/backend-reachable class.
          COMMENT
          cat /tmp/tofu-plan-blocked.md >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::tofu plan route blocked: ${REASON}"

      - name: Post blocked route as sticky PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tofu-plan
          path: /tmp/tofu-plan-blocked.md

  plan:
    name: tofu plan
    needs: route-preflight
    if: needs.route-preflight.outputs.ready == 'true'
    runs-on: ${{ fromJSON(needs.route-preflight.outputs.labels_json) }}
    env:
      CHECKOUT_PATH: repo-${{ github.job }}
      TF_DATA_DIR: /tmp/darkmap-tofu-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Reclaim stale runner workspace
        run: find "$GITHUB_WORKSPACE" -maxdepth 1 -mindepth 1 -type d -name 'repo-*' ! -name "$CHECKOUT_PATH" -exec rm -rf {} +

      - uses: actions/checkout@v6
        with:
          path: ${{ env.CHECKOUT_PATH }}

      - name: Configure GloriousFlywheel cache hints
        env:
          GF_ACTION_RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: bash "$CHECKOUT_PATH/scripts/setup-flywheel.sh"

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.11.6'
          tofu_wrapper: false

      - name: Install kubectl
        uses: yokawasa/action-setup-kube-tools@v0.13.5
        with:
          kubectl: '1.31.0'

      - name: tofu fmt check
        working-directory: ${{ env.CHECKOUT_PATH }}
        run: tofu fmt -check -recursive infra/tofu

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::error::KUBE_CONFIG_HONEY secret is required for tofu plan"
            exit 1
          fi

          kube_dir="$RUNNER_TEMP/darkmap-kube"
          kubeconfig="$kube_dir/config"
          mkdir -p "$kube_dir"
          echo "$KUBE_CONFIG_HONEY" | base64 -d > "$kubeconfig"
          chmod 600 "$kubeconfig"
          "$CHECKOUT_PATH/scripts/ci-normalize-kubeconfig.sh" "$kubeconfig" honey
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"
          echo "TF_VAR_kubeconfig=$kubeconfig" >> "$GITHUB_ENV"

      - name: tofu init (rustfs backend)
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
        run: ../../scripts/ci-tofu-init-retry.sh -backend-config=backend.hcl -lockfile=readonly

      - name: tofu state backend check
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
        run: ../../scripts/ci-tofu-state-check.sh

      - name: tofu plan
        id: plan
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          tofu plan -no-color -out=darkmap.tfplan 2>&1 | tee /tmp/tofu-plan.txt
          plan_exit=${PIPESTATUS[0]}
          echo "plan_exit=$plan_exit" >> "$GITHUB_OUTPUT"
          exit "$plan_exit"

      - name: Compose PR comment body
        if: always() && github.event_name == 'pull_request'
        env:
          PLAN_EXIT: ${{ steps.plan.outputs.plan_exit }}
          RUNNER_ENV: ${{ runner.environment }}
        run: |
          if [ -s /tmp/tofu-plan.txt ]; then
            PLAN_BODY=$(head -c 60000 /tmp/tofu-plan.txt)
          else
            PLAN_BODY="(no plan output — the init or plan step bailed before producing a diff; see workflow log)"
          fi
          cat > /tmp/plan-comment.md <<COMMENT
          ### tofu plan for infra/tofu/

          \`\`\`diff
          ${PLAN_BODY}
          \`\`\`

          Exit: ${PLAN_EXIT:-?} · Runner: ${RUNNER_ENV:-?} · Backend: rustfs S3
          <sub>Plan output truncated at 60k; full output in the workflow log.</sub>
          COMMENT

      - name: Post plan as sticky PR comment
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: tofu-plan
          path: /tmp/plan-comment.md

      - name: Upload plan artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tofu-plan
          path: ${{ env.CHECKOUT_PATH }}/infra/tofu/darkmap.tfplan
          retention-days: 14
