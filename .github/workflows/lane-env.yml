name: Lane env

# Thin wrapper over tinyland-inc/ci-templates@v1.1.2's spoke-lane-env.yml.
# See docs/CI-SCHEMA.md §4 + §7 for the dispatch payload + ephemeral-env
# contract.
#
# v1.1.0 made BLAHAJ_DISPATCH_TOKEN optional and added an internal
# `check-blahaj-token` gate job that runs first and short-circuits
# downstream jobs when the secret is empty. So this workflow can keep
# the `pull_request:` trigger enabled before Blahaj is installed — the
# pipeline will skip cleanly with a `::notice::` rather than fail with
# "workflow file issue" at parse time.
#
# When Blahaj is installed on Jesssullivan/darkmap.tinyland.dev and
# BLAHAJ_DISPATCH_TOKEN is populated as a repo secret, the pipeline
# automatically starts firing for real (per-lane image builds, Blahaj
# dispatch, status checks). No code change required at that point —
# just the secret + (optionally) `vars.BLAHAJ_LANE_ENV_ENABLED = 'true'`
# to flip the job-level `if:` if you want belt-and-suspenders gating.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      pr:
        required: true
        type: number
      reap:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: write
  statuses: write
  deployments: write

concurrency:
  group: lane-env-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: false

jobs:
  lane-env:
    # `vars.BLAHAJ_LANE_ENV_ENABLED == 'true'` belt + suspenders. With
    # v1.1.0's internal check-blahaj-token gate, the workflow is
    # ALREADY safe to fire without the var. This `if:` lets the operator
    # disable the wrapper repo-wide via the GitHub UI without editing
    # the file.
    if: ${{ vars.BLAHAJ_LANE_ENV_ENABLED != 'false' }}
    uses: tinyland-inc/ci-templates/.github/workflows/spoke-lane-env.yml@v1.1.2
    with:
      spoke: darkmap
      lanes_path: .github/lanes.json
      enable_tailnet_qa: false
      reap: ${{ github.event.action == 'closed' || inputs.reap || false }}
      pr_number: ${{ github.event.pull_request.number || inputs.pr }}
    # No secrets block: spoke-lane-env.yml@v1.1.2 declares
    # BLAHAJ_DISPATCH_TOKEN + TAILSCALE_API_KEY as `required: false`.
    # Once Blahaj is installed and BLAHAJ_DISPATCH_TOKEN is set as a
    # repo secret, add it back here as:
    #   secrets:
    #     BLAHAJ_DISPATCH_TOKEN: ${{ secrets.BLAHAJ_DISPATCH_TOKEN }}
    # Until then, omit — passing an undefined `${{ secrets.X }}`
    # expression in a workflow_call secrets block can trip parse-time
    # validation in some GH paths.
