name: Lane env

# ci-templates v2 makes BLAHAJ_DISPATCH_TOKEN optional and exits cleanly
# when the token is absent, so this workflow can remain enabled for PRs
# before Blahaj is installed. The repo-level var below is still the
# operator gate for actually provisioning/reaping lane environments.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      pr:
        required: true
        type: number
      reap:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: write
  statuses: write
  deployments: write

concurrency:
  group: lane-env-${{ github.event.pull_request.number || inputs.pr || github.run_id }}
  cancel-in-progress: false

jobs:
  lane-env:
    if: ${{ vars.BLAHAJ_LANE_ENV_ENABLED == 'true' }}
    uses: tinyland-inc/ci-templates/.github/workflows/spoke-lane-env.yml@v2
    with:
      spoke: darkmap
      image_repository: ghcr.io/jesssullivan/darkmap.tinyland.dev
      lanes_path: .github/lanes.json
      enable_tailnet_qa: false
      reap: ${{ inputs.reap || false }}
      pr_number: ${{ github.event.pull_request.number || inputs.pr || 0 }}
    secrets:
      BLAHAJ_DISPATCH_TOKEN: ${{ secrets.BLAHAJ_DISPATCH_TOKEN }}
