name: Lane env

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      pr:
        required: true
        type: number
      reap:
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  pull-requests: write
  statuses: write
  deployments: write

concurrency:
  group: lane-env-${{ github.event.pull_request.number || inputs.pr }}
  cancel-in-progress: false

# Thin wrapper over tinyland-inc/ci-templates' spoke-lane-env.yml@v1.0.0.
# See docs/CI-SCHEMA.md §4 + §7 for the dispatch payload + ephemeral-env
# contract.
#
# Gated on BLAHAJ_LANE_ENV_ENABLED var (default off) — when Blahaj is
# installed on Jesssullivan/darkmap.tinyland.dev (operator decision
# tracked in TIN-1384), flip vars.BLAHAJ_LANE_ENV_ENABLED to 'true' in
# repo settings and the workflow goes live.

jobs:
  lane-env:
    if: ${{ vars.BLAHAJ_LANE_ENV_ENABLED == 'true' }}
    uses: tinyland-inc/ci-templates/.github/workflows/spoke-lane-env.yml@v1.0.0
    with:
      spoke: darkmap
      lanes_path: .github/lanes.json
      enable_tailnet_qa: false
      reap: ${{ github.event.action == 'closed' || inputs.reap || false }}
      pr_number: ${{ github.event.pull_request.number || inputs.pr }}
    secrets:
      BLAHAJ_DISPATCH_TOKEN: ${{ secrets.BLAHAJ_DISPATCH_TOKEN }}
