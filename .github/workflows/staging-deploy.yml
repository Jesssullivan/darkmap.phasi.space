# =============================================================================
# GitHub Actions: deploy darkmap.phasi.space to the blahaj honey cluster.
#
# Deploy requires a cluster-capable runner. Hosted runners may build and smoke
# the public site, but they must not apply Kustomize or touch RustFS-backed
# state. Push deploys run only after the Container workflow publishes the image
# tag that this workflow applies.
# =============================================================================

name: Staging deploy

on:
  workflow_run:
    workflows: ['Container']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag to deploy (default: current SHA)'
        required: false
        default: ''

concurrency:
  group: staging-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  route-preflight:
    name: deploy route preflight
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (vars.STAGING_DEPLOY_ENABLED == 'true' && github.event.workflow_run.conclusion == 'success')
      }}
    outputs:
      ready: ${{ steps.preflight.outputs.ready }}
      labels_json: ${{ steps.preflight.outputs.labels_json }}
      label_list: ${{ steps.preflight.outputs.label_list }}
      reason: ${{ steps.preflight.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - id: preflight
        name: Check cluster runner route
        env:
          RUNNER_ROUTE_PREFLIGHT_TOKEN: ${{ secrets.RUNNER_ROUTE_PREFLIGHT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ALLOW_UNVERIFIED_SELF_HOSTED_ROUTE: 'true'
          TOFU_LINUX_RUNNER_LABELS_JSON: ${{ vars.TOFU_LINUX_RUNNER_LABELS_JSON || '' }}
          PRIMARY_LINUX_RUNNER_LABELS_JSON: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]' }}
        run: node scripts/ci-tofu-route-preflight.mjs

  route-blocked:
    name: deploy route blocked
    needs: route-preflight
    if: needs.route-preflight.outputs.ready != 'true'
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    steps:
      - name: Summarize blocked deploy route
        env:
          LABELS: ${{ needs.route-preflight.outputs.label_list }}
          REASON: ${{ needs.route-preflight.outputs.reason }}
        run: |
          {
            echo "### staging deploy blocked before kubectl"
            echo
            echo "The deploy did not request a cluster job because no"
            echo "repository-visible, cluster-capable runner matched the"
            echo "selected Tofu/deploy labels."
            echo
            echo "- Selected labels: \`${LABELS}\`"
            echo "- Reason: ${REASON}"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::staging deploy route blocked: ${REASON}"

  deploy:
    name: kubectl apply -k
    needs: route-preflight
    if: needs.route-preflight.outputs.ready == 'true'
    # Kustomize deploys need the same cluster-capable route class as
    # RustFS-backed Tofu jobs.
    runs-on: ${{ fromJSON(needs.route-preflight.outputs.labels_json) }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Install kubectl + kustomize
        uses: yokawasa/action-setup-kube-tools@v0.13.5
        with:
          kubectl: '1.31.0'
          kustomize: '5.4.3'

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::warning::KUBE_CONFIG_HONEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_HONEY" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          scripts/ci-normalize-kubeconfig.sh ~/.kube/config honey

      - name: Pin image to current short SHA
        working-directory: infra/kustomize/honey/darkmap
        env:
          DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.image_tag || '' }}
        run: |
          TAG="$IMAGE_TAG"
          if [ -z "$TAG" ]; then TAG="${DEPLOY_SHA:0:7}"; fi
          kustomize edit set image "darkmap=ghcr.io/jesssullivan/darkmap.phasi.space:${TAG}"
          kustomize build .

      - name: Apply manifests
        working-directory: infra/kustomize/honey/darkmap
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::warning::KUBE_CONFIG_HONEY secret not set — skipping apply"
            exit 0
          fi
          # --validate=false skips the openapi schema download which has
          # been timing out from the ARC runner pool. The apply itself
          # still goes through the kube-apiserver and gets validated
          # server-side.
          kustomize build . | kubectl apply --validate=false -f -

      - name: Wait for rollout
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then exit 0; fi
          if ! kubectl -n darkmap rollout status deployment/darkmap --timeout=180s; then
            kubectl -n darkmap get deploy,rs,pods -o wide
            kubectl -n darkmap describe deploy darkmap
            kubectl -n darkmap get events --sort-by=.lastTimestamp | tail -80
            exit 1
          fi

      - name: Smoke public edge
        run: |
          curl -fsSIL https://darkmap.phasi.space/ | tee /tmp/index.headers
          curl -fsSIL 'https://darkmap.phasi.space/service-worker.js?smoke=${{ github.sha }}' | tee /tmp/service-worker.headers
          curl -fsSIL 'https://darkmap.phasi.space/api/raster?layer=viirs_2019&z=8&x=74&y=96' | tee /tmp/raster.headers
          grep -qi '^server: cloudflare' /tmp/index.headers
          grep -Eqi '^cache-control: .*(no-store|max-age=0)' /tmp/service-worker.headers
          grep -qi '^content-type: image/png' /tmp/raster.headers
