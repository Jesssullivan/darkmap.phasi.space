# =============================================================================
# GitHub Actions: deploy darkmap.tinyland.dev to the blahaj honey cluster.
#
# STATUS (2026-05-18): the CI auto-deploy path is BLOCKED by runner-pool
# connectivity. The ARC self-hosted runner pods cannot route to the
# cluster API at the tailnet IP 100.113.89.12:6443 — `kubectl apply`
# times out at the TCP dial stage even with --validate=false (#68) and
# after switching off ubuntu-latest (#67). Two follow-up paths to
# unblock:
#   (a) Mount an in-cluster ServiceAccount with RBAC on darkmap ns +
#       use https://kubernetes.default.svc (preferred, scoped)
#   (b) Add a Tailscale sidecar to the runner pod so its kubeconfig
#       works
#
# Until (a) or (b) lands, the canonical deploy is operator-side from a
# tailnet-joined workstation:
#
#   just deploy
#
# That applies the kustomize overlay, rollout-restarts so the `:main`
# floating tag picks up the fresh image, and waits for the rollout.
# The CI workflow stays in place so it'll just start working again
# once connectivity is fixed.
# =============================================================================

name: Staging deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Container image tag to deploy (default: current SHA)'
        required: false
        default: ''

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: kubectl apply -k
    # Cluster API at `100.x` is tailnet-only; we have to run on a
    # tailnet-joined self-hosted runner. The TOFU runner pool already
    # has cluster reachability (used by tofu-apply against rustfs).
    runs-on: ${{ fromJSON(vars.TOFU_LINUX_RUNNER_LABELS_JSON || vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' || vars.STAGING_DEPLOY_ENABLED == 'true'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install kubectl + kustomize
        uses: yokawasa/action-setup-kube-tools@v0.11.2
        with:
          kubectl: '1.31.0'
          kustomize: '5.4.3'

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::warning::KUBE_CONFIG_HONEY secret not set — skipping deploy"
            exit 0
          fi
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG_HONEY" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context honey

      - name: Pin image to current SHA
        working-directory: infra/kustomize/honey/darkmap
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          kustomize edit set image darkmap=ghcr.io/jesssullivan/darkmap.tinyland.dev:${TAG}
          kustomize build .

      - name: Apply manifests
        working-directory: infra/kustomize/honey/darkmap
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::warning::KUBE_CONFIG_HONEY secret not set — skipping apply"
            exit 0
          fi
          # --validate=false skips the openapi schema download which has
          # been timing out from the ARC runner pool. The apply itself
          # still goes through the kube-apiserver and gets validated
          # server-side.
          kustomize build . | kubectl apply --validate=false -f -

      - name: Wait for rollout
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then exit 0; fi
          kubectl -n darkmap rollout status deployment/darkmap --timeout=180s
