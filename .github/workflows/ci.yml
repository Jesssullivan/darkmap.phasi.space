name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Thin wrapper over tinyland-inc/ci-templates@v1.1.0's spoke-ci.yml.
# See docs/CI-SCHEMA.md §6 for the runner-class matrix.
#
# Passes darkmap's existing dynamic runner-class fallback via
# `runner_labels_json` (new in ci-templates v1.1.0). This preserves
# graceful degradation to ubuntu-latest when the cluster ARC labels
# aren't reachable — matching the pre-wrapper behavior of darkmap's
# hand-rolled ci.yml.
#
# Bump @v1.1.0 deliberately after reviewing the ci-templates CHANGELOG.

jobs:
  ci:
    uses: tinyland-inc/ci-templates/.github/workflows/spoke-ci.yml@v1.1.0
    with:
      node_version: "22"
      pnpm_version: "10.13.1"
      flywheel_config: flywheel
      playwright_enabled: false
      lanes_path: .github/lanes.json
      default_runner_class: tinyland-nix
      runner_labels_json: ${{ vars.BAZEL_LINUX_RUNNER_LABELS_JSON || vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]' }}
    # No secrets block: spoke-ci.yml@v1.1.0 declares ATTIC_TOKEN as
    # `required: false`. `secrets: inherit` is rejected at workflow
    # parse-time when caller (Jesssullivan/*) and callee (tinyland-inc/*)
    # are not in the same org/enterprise. Omit entirely.
