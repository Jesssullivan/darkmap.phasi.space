name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets-scan:
    name: secrets-scan
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Scan repository for committed secrets
        run: nix develop --command gitleaks detect --source . --redact --verbose

  build-and-test:
    name: build-and-test
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install workspace dependencies
        run: nix develop --command just setup

      - name: Lint, typecheck, and unit tests
        run: nix develop --command just check

      - name: Build static site
        run: nix develop --command just build

  bazel-graph:
    name: bazel-graph
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve Bazel module graph
        run: nix develop --command bazelisk mod graph

      - name: Build npm link tree
        run: nix develop --command bazelisk build //:node_modules

  bazel-test:
    name: bazel-test
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    timeout-minutes: 30
    # On runners with `BAZEL_REMOTE_CACHE` injected by the runner pool
    # (GloriousFlywheel), the wrapper attaches a cache; otherwise this
    # runs in compatibility-local-only mode (still cached on disk).
    env:
      BAZEL_REMOTE_CACHE: ${{ vars.BAZEL_REMOTE_CACHE || '' }}
      BAZEL_REMOTE_EXECUTOR: ${{ vars.BAZEL_REMOTE_EXECUTOR || '' }}
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Cache attachment contract
        run: nix develop --command bash scripts/cache-attachment-contract.sh

      - name: bazel test (cache-backed when BAZEL_REMOTE_CACHE is set)
        run: |
          if [ -n "${BAZEL_REMOTE_CACHE:-}" ]; then
            nix develop --command bash scripts/bazel-cache-backed.sh test //...
          else
            nix develop --command bazelisk test //...
          fi
