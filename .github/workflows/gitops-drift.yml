name: GitOps drift

on:
  workflow_dispatch:
    inputs:
      fail_on_blocked_route:
        description: 'Fail when no cluster-capable runner is visible'
        type: boolean
        default: true
  schedule:
    - cron: '17 9 * * *'

permissions:
  contents: read
  actions: read

concurrency:
  group: gitops-drift
  cancel-in-progress: false

jobs:
  route-preflight:
    name: tofu route preflight
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    outputs:
      ready: ${{ steps.preflight.outputs.ready }}
      labels_json: ${{ steps.preflight.outputs.labels_json }}
      label_list: ${{ steps.preflight.outputs.label_list }}
      reason: ${{ steps.preflight.outputs.reason }}
    steps:
      - uses: actions/checkout@v6

      - id: preflight
        name: Check cluster runner route
        env:
          RUNNER_ROUTE_PREFLIGHT_TOKEN: ${{ secrets.RUNNER_ROUTE_PREFLIGHT_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ALLOW_UNVERIFIED_SELF_HOSTED_ROUTE: 'true'
          TOFU_LINUX_RUNNER_LABELS_JSON: ${{ vars.TOFU_LINUX_RUNNER_LABELS_JSON || '' }}
          PRIMARY_LINUX_RUNNER_LABELS_JSON: ${{ vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]' }}
        run: node scripts/ci-tofu-route-preflight.mjs

  blocked-route:
    name: drift route blocked
    needs: route-preflight
    if: needs.route-preflight.outputs.ready != 'true'
    runs-on: ${{ fromJSON(vars.PRIMARY_LINUX_RUNNER_LABELS_JSON || '["ubuntu-latest"]') }}
    steps:
      - name: Report blocked route
        env:
          LABELS: ${{ needs.route-preflight.outputs.label_list }}
          REASON: ${{ needs.route-preflight.outputs.reason }}
          FAIL_ON_BLOCKED_ROUTE: ${{ github.event_name == 'schedule' || inputs.fail_on_blocked_route }}
        run: |
          {
            echo "### GitOps drift blocked"
            echo
            echo "OpenTofu/RustFS and Kustomize drift checks require a repository-visible"
            echo "cluster-capable runner."
            echo
            echo "- Selected labels: \`${LABELS}\`"
            echo "- Reason: ${REASON}"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL_ON_BLOCKED_ROUTE" = "true" ]; then
            echo "::error::GitOps drift route is blocked: ${REASON}"
            exit 1
          fi

  drift:
    name: tofu + kustomize drift
    needs: route-preflight
    if: needs.route-preflight.outputs.ready == 'true'
    runs-on: ${{ fromJSON(needs.route-preflight.outputs.labels_json) }}
    timeout-minutes: 20
    env:
      CHECKOUT_PATH: repo-${{ github.job }}
      TF_DATA_DIR: /tmp/darkmap-tofu-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Reclaim stale runner workspace
        run: find "$GITHUB_WORKSPACE" -maxdepth 1 -mindepth 1 -type d -name 'repo-*' ! -name "$CHECKOUT_PATH" -exec rm -rf {} +

      - uses: actions/checkout@v6
        with:
          path: ${{ env.CHECKOUT_PATH }}

      - name: Configure GloriousFlywheel cache hints
        env:
          GF_ACTION_RUNNER_ENVIRONMENT: ${{ runner.environment }}
        run: bash "$CHECKOUT_PATH/scripts/setup-flywheel.sh"

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: '1.11.6'
          tofu_wrapper: false

      - name: Install kubectl + kustomize
        uses: yokawasa/action-setup-kube-tools@v0.11.2
        with:
          kubectl: '1.31.0'
          kustomize: '5.4.3'

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_HONEY: ${{ secrets.KUBE_CONFIG_HONEY }}
        run: |
          if [ -z "$KUBE_CONFIG_HONEY" ]; then
            echo "::error::KUBE_CONFIG_HONEY secret is required for GitOps drift"
            exit 1
          fi

          kube_dir="$RUNNER_TEMP/darkmap-kube"
          kubeconfig="$kube_dir/config"
          mkdir -p "$kube_dir"
          echo "$KUBE_CONFIG_HONEY" | base64 -d > "$kubeconfig"
          chmod 600 "$kubeconfig"
          "$CHECKOUT_PATH/scripts/ci-normalize-kubeconfig.sh" "$kubeconfig" honey
          echo "KUBECONFIG=$kubeconfig" >> "$GITHUB_ENV"
          echo "TF_VAR_kubeconfig=$kubeconfig" >> "$GITHUB_ENV"

      - name: tofu init (rustfs backend)
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
        run: ../../scripts/ci-tofu-init-retry.sh -backend-config=backend.hcl -lockfile=readonly

      - name: tofu state backend check
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
        run: ../../scripts/ci-tofu-state-check.sh

      - name: tofu drift plan
        id: tofu_drift
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/tofu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RUSTFS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RUSTFS_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set +e
          tofu plan -detailed-exitcode -no-color -out=darkmap-drift.tfplan 2>&1 | tee /tmp/tofu-drift.txt
          plan_exit=${PIPESTATUS[0]}
          set -e

          if [ "$plan_exit" = "0" ]; then
            echo "tofu_status=clean" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$plan_exit" = "2" ]; then
            echo "tofu_status=drift" >> "$GITHUB_OUTPUT"
            echo "::error::OpenTofu drift detected"
            exit 1
          fi

          echo "tofu_status=error" >> "$GITHUB_OUTPUT"
          exit "$plan_exit"

      - name: kustomize server diff
        working-directory: ${{ env.CHECKOUT_PATH }}/infra/kustomize/honey/darkmap
        run: |
          TAG="${GITHUB_SHA:0:7}"
          kustomize edit set image "darkmap=ghcr.io/jesssullivan/darkmap.phasi.space:${TAG}"
          echo "Kustomize desired image: ghcr.io/jesssullivan/darkmap.phasi.space:${TAG}" >> "$GITHUB_STEP_SUMMARY"

          kustomize build . > /tmp/kustomize-rendered.yaml

          set +e
          kubectl diff -f /tmp/kustomize-rendered.yaml > /tmp/kustomize-drift.txt
          diff_exit=$?
          set -e

          if [ "$diff_exit" = "0" ]; then
            echo "Kustomize live state is clean" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ "$diff_exit" = "1" ]; then
            echo "::error::Kustomize drift detected"
            cat /tmp/kustomize-drift.txt
            exit 1
          fi

          exit "$diff_exit"

      - name: Summarize clean drift check
        if: success()
        run: |
          {
            echo "### GitOps drift"
            echo
            echo "- OpenTofu/RustFS state: clean"
            echo "- Kustomize live state: clean"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitops-drift-${{ github.run_id }}
          path: |
            ${{ env.CHECKOUT_PATH }}/infra/tofu/tofu-init.log
            ${{ env.CHECKOUT_PATH }}/infra/tofu/tofu-state-list.log
            /tmp/tofu-drift.txt
            /tmp/kustomize-drift.txt
          if-no-files-found: ignore
          retention-days: 30
