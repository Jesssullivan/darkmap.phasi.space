apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace is created by Tofu (infra/tofu/main.tf). This block places
# every resource emitted here into that namespace via server-side merge.
namespace: darkmap

labels:
  # These labels are part of the live Deployment/Service/PDB selectors.
  # Kubernetes treats Deployment selectors as immutable, so keep this
  # selector identity stable even while public-facing metadata moves to
  # darkmap.phasi.space in docs, repo metadata, image names, and ingress
  # hosts.
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: darkmap
      app.kubernetes.io/instance: darkmap-honey
      app.kubernetes.io/part-of: darkmap.tinyland.dev
      app.kubernetes.io/managed-by: kustomize
      tinyland.dev/site: darkmap.tinyland.dev

resources:
  - deployment.yaml
  - service.yaml
  - tailscale-svc.yaml
  - ingress.yaml
  - poddisruptionbudget.yaml

# CI substitutes the short SHA tag emitted by docker/metadata-action via
# `kustomize edit set image` before applying. The `:main` floating tag is
# the default for ad-hoc operator applies.
images:
  - name: darkmap
    newName: ghcr.io/jesssullivan/darkmap.phasi.space
    newTag: main
