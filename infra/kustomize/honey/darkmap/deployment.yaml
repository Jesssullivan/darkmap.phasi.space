apiVersion: apps/v1
kind: Deployment
metadata:
  name: darkmap
spec:
  # 2 replicas + maxUnavailable: 0 means node drain or rolling update
  # always keeps at least one pod serving. PodDisruptionBudget (see
  # poddisruptionbudget.yaml in this overlay) guarantees the same
  # against voluntary disruption.
  replicas: 2
  # 2026-05-18: 78-minute rollout drift caused asset-hash mismatch
  # (three image SHAs alive simultaneously, nginx round-robined to
  # pods missing the requested bundle hashes, users saw 500s on
  # /_app/immutable/entry/*.js). progressDeadlineSeconds catches
  # a stuck pod inside 5 min so the kubelet retries instead of
  # leaving a half-rolled state hanging.
  progressDeadlineSeconds: 300
  # Wait 5 s after a pod hits Ready before counting it Available, so
  # nginx finishes registering the endpoint before we send the next
  # replica's pod into Terminating.
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: darkmap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: darkmap
    spec:
      # The kubelet pulls GHCR images via the `ghcr-registry` secret.
      # Provisioning of the pull secret is an operator concern outside
      # this public repo.
      imagePullSecrets:
        - name: ghcr-registry
      # The blahaj `honey-sting-tailnet` ProxyClass is restricted to
      # honey/sting; pin the workload to the same shape so the tailnet
      # exposure and the workload are colocated and predictable.
      #
      # 2026-05-18: bumble dropped from the preference list after it
      # went Ready,SchedulingDisabled with a stale heartbeat — every
      # rollout's new replicas landed there and hung in
      # ContainerCreating because the cordon stopped pulls. Re-add
      # bumble once the node returns to healthy.
      nodeSelector:
        kubernetes.io/os: linux
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ['honey', 'sting']
      containers:
        - name: app
          image: darkmap
          # The kustomize image transformer floats `:main` as the default
          # tag. With IfNotPresent the kubelet keeps the previously-pulled
          # layer even after a `kubectl rollout restart`, so SHA-bumps to
          # the same tag don't reach the pod. `Always` re-checks the
          # digest on each pod start. CI overrides the tag to the SHA at
          # apply time, which would also fix this on the staging-deploy
          # path — but rollouts initiated outside that path (e.g. when an
          # operator runs `just kustomize-apply` after a manual
          # `kubectl rollout restart`) need this safety net.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: HOST
              value: '0.0.0.0'
            - name: PORT
              value: '3000'
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: '50m'
              memory: '128Mi'
            limits:
              cpu: '500m'
              memory: '512Mi'
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
      securityContext:
        seccompProfile:
          type: RuntimeDefault
